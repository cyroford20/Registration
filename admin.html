<!doctype html>
<html lang="en">

<head>
  <title>Cyber Spin Wheel Admin - IT Exhibit</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap");
  </style>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="src/admin.css" />
</head>

<body>
  <div class="admin">
    <h1>⚙️ WHEEL CONFIGURATION</h1>

    <!-- WHEEL CONFIGURATION SECTION -->
    <section id="sectorPanel" class="wheel-config-section">
      <h2>🎡 SECTOR CONFIGURATION</h2>

      <div class="actions">
        <button id="add">Add sector</button>
        <button id="save">Save</button>
        <button id="openQrRegister" type="button">QR Code</button>
        <button id="exportUsersExcel" type="button">Export Excel</button>
        <button id="exportUsersPdf" type="button">Export PDF</button>
        <a class="link" href="/">Back to wheel</a>
      </div>

      <div id="status" class="status" aria-live="polite"></div>

      <div class="tableWrap">
        <table class="table" aria-label="Wheel sectors">
          <thead>
            <tr>
              <th>Label</th>
              <th>Color</th>
              <th>Text</th>
              <th>Weight</th>
              <th>Probability</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script defer src="src/admin.js"></script>
</body>

</html>
