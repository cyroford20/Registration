version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=cyber_spin_wheel
    depends_on:
      - db
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cyber_spin_wheel
    volumes:
      - db_data:/var/lib/mysql
      - ./database-setup.sql:/docker-entrypoint-initdb.d/database-setup.sql

volumes:
  db_data:
